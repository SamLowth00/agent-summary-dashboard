services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3333
      # DB lives on the mounted volume so it persists across restarts.
      DATABASE_STORAGE: /app/db/database.db
      CORS_ORIGIN: http://localhost:8080
      WEATHER_API_URL: https://api.open-meteo.com/v1/forecast
    volumes:
      - db-data:/app/db
    ports:
      - '3333:3333'
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - '8080:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
